name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Install dependencies
        run: uv pip install --system pyyaml types-PyYAML

      - name: Validate plugin manifest
        run: |
          python -c "
          import json
          data = json.load(open('.claude-plugin/plugin.json'))
          name = data.get('name', '?')
          ver = data.get('version', '?')
          print(f'Plugin: {name} v{ver}')
          "

      - name: Lint Python scripts
        run: |
          if ls scripts/*.py 1> /dev/null 2>&1; then
            uv run --with ruff ruff check scripts/ --select=E,F,W --ignore=E501
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get recent commits (limit to 50)
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --max-count=50 HEAD --)
          else
            # Get commits since previous tag
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          # Write changelog to file for multi-line output
          echo "$CHANGELOG" > changelog.txt
          echo "changelog_file=changelog.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

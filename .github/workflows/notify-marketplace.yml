# Notify ai-maestro-plugins marketplace when this plugin version is updated.
#
# SETUP:
# 1. Add a `MARKETPLACE_DISPATCH_TOKEN` secret to this repo:
#    - Create a GitHub PAT (classic) with `repo` scope for 23blocks-OS/ai-maestro-plugins
#    - Go to Settings → Secrets and variables → Actions → New repository secret
#    - Name: MARKETPLACE_DISPATCH_TOKEN
#    - Value: paste the PAT
#
# ALTERNATIVE: If cross-org PATs are not feasible, the marketplace repo
# can poll plugin versions on a schedule instead.

name: Notify Marketplace of Version Update

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Notify marketplace
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          repository: 23blocks-OS/ai-maestro-plugins
          event-type: plugin-version-update
          client-payload: '{"plugin_name": "${{ steps.version.outputs.name }}", "version": "${{ steps.version.outputs.version }}"}'

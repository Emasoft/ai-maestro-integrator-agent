name: Plugin Validation

on:
  push:
    branches: [main, master]
    paths:
      - '.claude-plugin/**'
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/**'
      - 'rules/**'
      - '*.mcp.json'
      - '.lsp.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    # Hard cap so the remote CPV validation can't hang the job indefinitely
    # (the GitHub-integrity urlopen could stall) — matches ci.yml's Validate cap.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run CPV validation (--strict via remote launcher)
        # Skip CPV's GitHub-anchored integrity fetch (a live urlopen to
        # raw.githubusercontent.com): on a fresh-checkout runner the local
        # self-hash manifest already matches the code, so it adds no security
        # but real latency/hang risk — this job hung 30+ min without it.
        # Do NOT set CLAUDE_PRIVATE_USERNAMES to the repo owner here: it makes
        # CPV flag the PUBLIC owner as a CRITICAL "private path leaked" finding
        # (Emasoft/claude-plugins-validation#140).
        env:
          PLUGIN_SKIP_GITHUB_INTEGRITY: "1"
        run: |
          echo "=== CPV Plugin Validation (--strict) ==="
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation \
              --with pyyaml \
              cpv-remote-validate plugin . --strict --verbose --report validation-report.md
          EXIT_CODE=$?
          set -e

          # Exit codes: 0=PASS, 1=CRITICAL, 2=MAJOR, 3=MINOR, 4=NIT (strict)
          # Quality gate: ONLY exit 0 passes. All issues block.
          if [ $EXIT_CODE -eq 0 ]; then
            echo "=== Validation PASSED (--strict) ==="
          else
            echo "=== BLOCKED: Validation issues found (exit $EXIT_CODE) ==="
            cat validation-report.md 2>/dev/null || true
            exit $EXIT_CODE
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.md
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Plugin Validation" >> "$GITHUB_STEP_SUMMARY"
          if [ -f validation-report.md ]; then
            cat validation-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
